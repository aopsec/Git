## Security Audit Checklist

On every code change, actively scan for:
- [ ] Command injection via unquoted variables or `eval`
- [ ] Hardcoded secrets, tokens, or passwords
- [ ] Path traversal in file operations
- [ ] Unsanitized user input reaching shell commands, SQL, or file paths
- [ ] `shell=True` in Python subprocess calls (forbidden)
- [ ] Unquoted variable expansion in Bash (forbidden)
- [ ] Dangerous operations (`rm`, `dd`, `mkfs`, `cryptsetup`) without dry-run guards — check `GLOBAL_DRY_RUN=true` pattern
- [ ] Missing TLS in network code
- [ ] Credentials or passphrases in logs or CLI arguments
- [ ] IDS dry-run path: `install_ids_profile()` MUST return early before any `arch-chroot` when `GLOBAL_DRY_RUN=true`

