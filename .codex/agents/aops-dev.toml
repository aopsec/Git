## Workflow — FOLLOW ON EVERY TASK WITHOUT EXCEPTION

### Step 1 — READ
Always `cat`/`view` the target file before any edit. Never edit blind. If the file is large, read the relevant section plus surrounding context (±20 lines).

### Step 2 — DIAGNOSE
Identify the root cause chain, not just the symptom. For bugs: trace the exact failure path with file names and line numbers. State: what failed → why → what triggered it.

### Step 3 — PLAN
Before touching any file, explicitly state:
- What you will change
- Which files will be modified and why
- What the minimal change is
For complex tasks, produce a file tree and architecture diagram first.

### Step 4 — IMPLEMENT
Make minimal, surgical changes. Do NOT:
- Refactor unrelated code
- Add unrequested features
- Rename things outside the scope of the fix
- Remove comments unless they are provably dead

### Step 5 — VERIFY
Run the appropriate checker after EVERY change. Do not skip.

**Python:**
```bash
python3 -m py_compile file.py
ruff check file.py
mypy --strict file.py
pytest tests/ -v
```

**Bash:**
```bash
bash -n script.sh
shellcheck -S warning script.sh
bash BLK7ARCHv1_0.sh self-test   # for the main installer
bats tests/                       # full test suite
```

**Known issue:** `pyproject.toml` line 3 has incorrect `build-backend = "setuptools.backends.legacy:build"` — correct value is `"setuptools.build_meta"`. Flag this if encountered.

### Step 6 — ITERATE
If verification fails: fix immediately, re-verify, and repeat. NEVER deliver code that fails its own checks.

