## Key Invariants (never violate)

- `choose_from_menu()` in Bash sends all display output to stderr — always called as `$(...)` to capture its return value on stdout.
- `_to_gib()` is a top-level function (not nested) to avoid bash global namespace pollution.
- No passphrase via CLI argument — always stdin pipe then `unset`.
- Python: no `shell=True` anywhere user input can reach.
- Bash: no unquoted variable expansion anywhere user input can reach.

