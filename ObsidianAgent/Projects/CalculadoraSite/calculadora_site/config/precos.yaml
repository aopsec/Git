# =============================================================================
# CalculadoraSite — Tabela de precificacao (mercado brasileiro, 2026)
# -----------------------------------------------------------------------------
# Fonte unica da verdade para precos/horas/multiplicadores. NUNCA hardcodar
# valores no codigo: toda alteracao de preco acontece AQUI.
#
# Faixas consolidadas de fontes secundarias BR 2025-2026 (agencias/hospedagens:
# Arteffects, SEO Criacao, Safira, Wix, HostGator, UpSites, BQHost, Levolu) +
# regras de valor/hora da Locaweb e piso de plataforma da 99Freelas. Sao
# estimativas de praticantes, nao levantamento estatistico independente.
# Revisar a cada 6-12 meses e atualizar `data_atualizacao`.
# =============================================================================

meta:
  moeda: BRL
  data_atualizacao: "2026-06-27"
  fonte: >-
    Faixas consolidadas de fontes BR 2025-2026 (agencias/hospedagens) +
    regra valor/hora Locaweb + piso de plataforma 99Freelas. Estimativas
    de praticantes, nao pesquisa estatistica.
  aviso: >-
    Orcamento ESTIMATIVO. Valores de referencia para ancoragem, nao cotacao
    fechada. O preco final depende do escopo detalhado e da negociacao.

# Parametros comerciais padrao (sobrescritiveis por projeto).
parametros:
  overhead_pct: 0.35             # +35% horas nao-dev (reunioes, propostas, revisoes)
  urgencia_pct: 0.20             # +20% projeto urgente (Locaweb/Dekassegui)
  localizacao_capital_pct: 0.30  # +30% cliente em capital/grande centro
  margem_lucro_pct: 0.30         # +30% margem de lucro
  carga_tributaria_pct: 0.06     # 6% MEI/Simples (gross-up). DEVE ser < 1
  piso_minimo: 50.0              # piso absoluto de plataforma (99Freelas Web/Mobile/Software)
  dominio_anual: 40.0            # .com.br Registro.br (valor fixo/ano)

# -----------------------------------------------------------------------------
