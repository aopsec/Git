    nome: "Template pronto"
    multiplicador: 1.0
    descricao: "Tema/template, 10-20h"
  semi_custom:
    nome: "Semi-customizado"
    multiplicador: 1.3
    descricao: "Template + customizacao"
  custom:
    nome: "Custom autoral"
    multiplicador: 1.8
    descricao: "Design autoral, 40-80h"
  premium:
    nome: "Premium / design system"
    multiplicador: 2.2
    descricao: "Identidade visual + design system"

# -----------------------------------------------------------------------------
# Senioridade do executor — define o valor/hora SUGERIDO. A senioridade entra
# no calculo via valor/hora (nao como multiplicador separado) para evitar dupla
# contagem. O usuario pode sobrescrever valor_hora ou derivar de meta mensal.
# -----------------------------------------------------------------------------
