# /etc/openbox/iptv.conf — fonte IPTV para Jellyfin Live TV (OpenBox v0.2.0, RK3229)
# Consumido por usr/local/sbin/openbox-iptv-setup.sh.
#
# FONTE: apenas iptv-org — canais publicos, open-source, legais / free-to-air.
#        NAO usar listas pagas ou pirata. https://github.com/iptv-org/iptv
#
# AVISO 1GB RAM: a lista completa (index.m3u, ~10k canais) trava o Jellyfin/EPG
#                no RK3229. Use SEMPRE um subconjunto por pais/categoria/idioma:
#                  https://iptv-org.github.io/iptv/countries/br.m3u    (Brasil)
#                  https://iptv-org.github.io/iptv/languages/por.m3u   (portugues)
#                  https://iptv-org.github.io/iptv/categories/news.m3u (noticias)

# Playlist M3U (subconjunto leve — ajuste para seu pais/categoria)
IPTV_M3U_URL="https://iptv-org.github.io/iptv/categories/news.m3u"

# EPG XMLTV (OPCIONAL — Live TV funciona sem guia). Deixe vazio para sem-EPG.
# Guias iptv-org: https://github.com/iptv-org/epg (gerar) ou guia publico por pais.
IPTV_EPG_URL=""

# Jellyfin local (06-media publica em 127.0.0.1:8096)
JELLYFIN_URL="http://127.0.0.1:8096"

# Nome do tuner exibido no Jellyfin
IPTV_TUNER_NAME="OpenBox IPTV (iptv-org)"
