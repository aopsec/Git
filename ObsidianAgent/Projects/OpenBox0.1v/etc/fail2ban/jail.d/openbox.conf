# /etc/fail2ban/jail.d/openbox.conf
# OpenBox v0.1 — jails para SSH e auth HTTP via Caddy

[DEFAULT]
banaction = nftables-multiport
bantime  = 600
findtime = 600
maxretry = 5
backend  = systemd

[sshd]
enabled = true
port    = ssh
logpath = %(sshd_log)s

[caddy-auth]
enabled  = true
port     = http,https
# [FIX-AUDIT-F2B] Ship only the jail we can fully provision. Pi-hole auth is
# fronted by Caddy, so 401s land in the Caddy access log below.
filter   = caddy-openbox-auth
logpath  = /var/log/caddy/openbox-access.log
maxretry = 5
bantime  = 1800

[recidive]
enabled  = true
filter   = recidive
logpath  = /var/log/fail2ban.log
bantime  = 86400
findtime = 86400
maxretry = 3
