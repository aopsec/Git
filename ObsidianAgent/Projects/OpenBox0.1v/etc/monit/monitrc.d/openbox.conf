# /etc/monit/monitrc.d/openbox.conf
# OpenBox v0.1 — auto-restart de servicos criticos

set httpd port 2812 and use address 127.0.0.1
  allow 127.0.0.1
  allow admin:REPLACE_WITH_PASSWORD

set alert root@localhost not on { instance, action }

# ===== WireGuard =====
check process wireguard with matching "wg-quick"
  start program = "/bin/systemctl start wg-quick@wg0"
  stop  program = "/bin/systemctl stop wg-quick@wg0"
  if 5 restarts within 10 cycles then alert

# ===== Tor =====
check process tor with pidfile /run/tor/tor.pid
  start program = "/bin/systemctl start tor"
  stop  program = "/bin/systemctl stop tor"
  if failed host 127.0.0.1 port 9050 type tcp then restart
  if 5 restarts within 10 cycles then alert

# ===== dnscrypt-proxy =====
check process dnscrypt with matching "dnscrypt-proxy"
  start program = "/bin/systemctl start dnscrypt-proxy"
  stop  program = "/bin/systemctl stop dnscrypt-proxy"
  if failed host 127.0.0.1 port 5053 type udp then restart
  if 5 restarts within 10 cycles then alert

# ===== Pi-hole =====
check process pihole-FTL with pidfile /run/pihole-FTL.pid
  start program = "/bin/systemctl start pihole-FTL"
  stop  program = "/bin/systemctl stop pihole-FTL"
  if failed host 127.0.0.1 port 53 type udp then restart
  if 5 restarts within 10 cycles then alert

# ===== Caddy =====
check process caddy with matching "caddy run"
  start program = "/bin/systemctl start caddy"
  stop  program = "/bin/systemctl stop caddy"
  if failed host 127.0.0.1 port 443 type tcp then restart

# ===== Jellyfin container (substituiu Stremio no retarget RK3229 v0.2.0) =====
# [FIX-AUDIT-MONIT] `docker inspect` returns 0 for existing stopped containers,
# so use an explicit helper that exits non-zero unless the state is exactly true.
check program jellyfin with path "/usr/local/sbin/openbox-container-running.sh jellyfin"
  if status != 0 then exec "/usr/bin/docker start jellyfin"

# ===== System resources =====
check system $HOST
  if loadavg (5min) > 4 then alert
  if memory usage > 92% then alert
  if cpu usage > 90% for 3 cycles then alert
