version = 1

[project]
name = "AgentMesh"
tag = "agent-mesh"

[vault]
root = "vault"
generated = "vault/Generated"

[render]
generator_ref = "plugins/aops-agent/obsidian-agent/obsidian_agent_cli.py"
regenerate_command = "python3 \"${AOPS_OBSIDIAN_AGENT_CLI:-$HOME/plugins/aops-agent/obsidian-agent/obsidian_agent_cli.py}\" --sync --repo ."
stale_message = "AgentMesh vault output is stale. Regenerate with:"
summary_fallback = "absolute"

[repository_map]
include = true
core_documents = [
  "README",
  "docs/ARCHITECTURE",
  "docs/HARDENING",
  "docs/RUNBOOK",
]
manual_dashboards = [
  "AgentMesh Vault Home",
]

[related_notes]
defaults = ["README"]

[related_notes.match]
mesh = ["README", "docs/ARCHITECTURE"]
gateway = ["docs/RUNBOOK", "docs/ARCHITECTURE"]
litellm = ["docs/RUNBOOK"]
mcp = ["docs/ARCHITECTURE"]
security = ["docs/HARDENING"]
tailscale = ["docs/RUNBOOK"]
remote = ["docs/RUNBOOK", "docs/HARDENING"]

[[catalog]]
label = "Project Docs"
folder = "Project Docs"
note_prefix = "Doc"
tag = "project-doc"
source_patterns = ["docs/*.md"]
title_mode = "standard"
index_name = "Project Doc Index"

[[catalog]]
label = "Configs"
folder = "Configs"
note_prefix = "Config"
tag = "config"
source_patterns = [
  "gateway/litellm-config.yaml",
  "gateway/docker-compose.yml",
  "caddy/Caddyfile",
]
title_mode = "config"
index_name = "Config Index"

[[catalog]]
label = "MCP + Automation"
folder = "Automation"
note_prefix = "Automation"
tag = "automation"
source_patterns = [
  "mcp/*.sh",
  "gateway/*.sh",
]
title_mode = "standard"
index_name = "Automation Index"
