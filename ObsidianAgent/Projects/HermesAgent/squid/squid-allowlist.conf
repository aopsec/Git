# HermesAgent egress allowlist — loaded by ubuntu/squid from /etc/squid/conf.d/.
# Pattern from Hermes docs/security/network-egress-isolation.md: allow CONNECT only
# to explicitly named hosts, then deny everything else. This defends against
# prompt-injection exfiltration via curl/wget/raw HTTP from the gateway.
#
# DEFAULT = DENY ALL. The agent's normal operation needs NO internet: inference is
# local (ollama on the internal network, never via this proxy). Add a host below
# ONLY when a specific tool genuinely requires it, and prefer the narrowest domain.

# Non-matching placeholder so `allowed_hosts` is always a defined acl (squid refuses
# to start if `http_access` references an undefined acl). Keep this line; add real
# hosts as additional `acl allowed_hosts dstdomain ...` lines below.
acl allowed_hosts dstdomain hermes-egress.invalid

# ── Model-pull phase ONLY (uncomment, `make pull-model`, then RE-COMMENT) ─────────
# Needed once to fetch hermes3:8b. Comment it back out for steady-state air-gap.
# acl allowed_hosts dstdomain registry.ollama.ai
# acl allowed_hosts dstdomain .ollama.com

# ── Optional research/tool hosts (uncomment per need; keep the list minimal) ──────
# acl allowed_hosts dstdomain api.github.com
# acl allowed_hosts dstdomain raw.githubusercontent.com

# Allow HTTPS CONNECT only to the allowlisted hosts above.
http_access allow CONNECT allowed_hosts
# Deny everything else (the boundary).
http_access deny all
