# Vendored secret-detection ruleset.
#
# Curated subset of mazen160/secrets-patterns-db (https://github.com/mazen160/secrets-patterns-db),
# licensed CC-BY-4.0. Snapshot: 2026-05-14. AGPL-licensed rules derived from
# TruffleHog have been excluded to avoid copyleft contamination.
#
# Schema:
#   patterns:
#     - name:        kebab-case identifier (rule name)
#       regex:       Python regex string (PCRE-compatible subset)
#       confidence:  one of {low, medium, high} — used to assign Finding severity
#       description: short human-readable explanation
#
# Confidence → severity mapping in bbwebscan/stages/scrapy/bbspider.py:
#   high   → Finding.severity="high"
#   medium → Finding.severity="medium"
#   low    → Finding.severity="low"
#
# Each match yields a Finding with:
#   target  = source URL where the pattern was matched
#   title   = "<rule-name> pattern matched"
#   evidence = SHA-256 prefix (16 chars) of the matched string + source URL
# The raw matched string is NEVER persisted or echoed anywhere.
version: 1
patterns:
  # ----------------------------------------------------------------------
  # Cloud provider access keys
  # ----------------------------------------------------------------------
  - name: aws-access-key-id
    regex: '\bAKIA[0-9A-Z]{16}\b'
    confidence: high
    description: AWS access key ID (long-term IAM credential)
  - name: aws-secret-access-key
    regex: '(?i)aws(.{0,20})?(?-i)[''\"][0-9a-zA-Z/+]{40}[''\"]'
    confidence: high
    description: AWS secret access key (40-char base64 with aws context)
  - name: gcp-api-key
    regex: '\bAIza[0-9A-Za-z_\-]{35}\b'
    confidence: high
    description: Google Cloud API key
  - name: gcp-service-account-key
    regex: '"type":\s*"service_account"'
    confidence: high
    description: GCP service-account JSON key (marker present)
  - name: azure-client-secret
    regex: '(?i)client[_-]?secret["'']?\s*[:=]\s*["''][a-zA-Z0-9._~\-]{30,}["'']'
    confidence: medium
    description: Azure / OAuth client_secret assignment

  # ----------------------------------------------------------------------
  # SCM / collaboration tokens
  # ----------------------------------------------------------------------
  - name: github-personal-access-token
    regex: '\bghp_[A-Za-z0-9]{36}\b'
    confidence: high
    description: GitHub Personal Access Token (PAT)
  - name: github-oauth-token
    regex: '\bgho_[A-Za-z0-9]{36}\b'
    confidence: high
    description: GitHub OAuth access token
  - name: github-app-token
    regex: '\b(?:ghu|ghs)_[A-Za-z0-9]{36}\b'
    confidence: high
    description: GitHub App user-to-server / server-to-server token
  - name: github-refresh-token
    regex: '\bghr_[A-Za-z0-9]{36}\b'
    confidence: high
    description: GitHub refresh token
  - name: gitlab-personal-access-token
    regex: '\bglpat-[0-9a-zA-Z_\-]{20,}\b'
    confidence: high
    description: GitLab Personal Access Token
  - name: slack-bot-token
    regex: '\bxox[abprs]-[0-9A-Za-z-]{10,48}\b'
    confidence: high
    description: Slack bot/user/refresh token
  - name: slack-webhook
    regex: 'https://hooks\.slack\.com/services/T[A-Z0-9]+/B[A-Z0-9]+/[A-Za-z0-9]+'
    confidence: high
    description: Slack incoming webhook URL

  # ----------------------------------------------------------------------
  # PaaS / SaaS API keys
  # ----------------------------------------------------------------------
  - name: stripe-live-key
    regex: '\bsk_live_[0-9a-zA-Z]{24,}\b'
    confidence: high
    description: Stripe live secret key
  - name: stripe-restricted-key
    regex: '\brk_live_[0-9a-zA-Z]{24,}\b'
    confidence: high
    description: Stripe restricted live key
  - name: twilio-account-sid
    regex: '\bAC[a-zA-Z0-9]{32}\b'
    confidence: medium
    description: Twilio Account SID
  - name: sendgrid-api-key
    regex: '\bSG\.[A-Za-z0-9_\-]{22}\.[A-Za-z0-9_\-]{43}\b'
    confidence: high
    description: SendGrid API key
  - name: mailgun-api-key
    regex: '\bkey-[a-z0-9]{32}\b'
    confidence: medium
    description: Mailgun API key
  - name: square-access-token
    regex: '\bsq0atp-[0-9A-Za-z_\-]{22}\b'
    confidence: high
    description: Square access token
  - name: heroku-api-key
    regex: '\b[hH]eroku[^a-z0-9]?[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}\b'
    confidence: medium
    description: Heroku API key (UUID with heroku context)

  # ----------------------------------------------------------------------
  # Private keys / cryptographic material
  # ----------------------------------------------------------------------
  - name: pem-private-key
    regex: '-----BEGIN (?:RSA |EC |DSA |OPENSSH |PGP |ENCRYPTED )?PRIVATE KEY-----'
    confidence: high
    description: PEM-encoded private key header
  - name: ssh-private-key
    regex: '-----BEGIN OPENSSH PRIVATE KEY-----'
    confidence: high
    description: OpenSSH private key header
  - name: pgp-private-key
    regex: '-----BEGIN PGP PRIVATE KEY BLOCK-----'
    confidence: high
    description: PGP private key block

  # ----------------------------------------------------------------------
  # JWT and session
  # ----------------------------------------------------------------------
  - name: jwt-token
    regex: '\beyJ[A-Za-z0-9_\-]{10,}\.[A-Za-z0-9_\-]{10,}\.[A-Za-z0-9_\-]{10,}\b'
    confidence: medium
    description: JWT-shaped string (eyJ header)

  # ----------------------------------------------------------------------
  # Generic credentials in URLs / config strings
  # ----------------------------------------------------------------------
  - name: basic-auth-in-url
    regex: '\b(?:https?|ftp)://[^/\s:@]+:[^/\s:@]{4,}@[^/\s]+'
    confidence: medium
    description: HTTP/HTTPS/FTP URL embedding userinfo (user:pass@host)
  - name: connection-string-with-password
    regex: '(?i)(?:mongodb|postgres|mysql|redis|amqp)://[^:/\s]+:[^@/\s]+@'
    confidence: medium
    description: Database connection string with embedded password

  # ----------------------------------------------------------------------
  # Generic high-entropy hints (lower confidence, expect noise)
  # ----------------------------------------------------------------------
  - name: generic-api-key-assignment
    regex: '(?i)(?:api[_-]?key|secret|token|password|passwd|pwd)["'']?\s*[:=]\s*["''][A-Za-z0-9_\-+/=]{16,}["'']'
    confidence: low
    description: Variable assignment that looks like an api-key/secret/password
