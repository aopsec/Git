# waydroid.cfg — Configuracao do Waydroid para WSL2
# Template instalado pelo WslDroid. Copie para /var/lib/waydroid/waydroid.cfg se necessario.
# Documentacao: https://docs.waydro.id/

[waydroid]
# Modo de display: wayland (recomendado para WSLg) ou x11
display_type = wayland

# Backend de renderizacao: auto, software, egl, vulkan
render_backend = auto

# Modo de camadas: NORMAL ou SYSTEM (SYSTEM permite multi-janela experimental)
layers_mode = NORMAL

[session]
# Resolucao maxima do container Android (0 = automatico)
max_display_width = 0
max_display_height = 0
