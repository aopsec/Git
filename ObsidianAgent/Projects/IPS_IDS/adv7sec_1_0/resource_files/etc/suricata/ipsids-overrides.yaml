%YAML 1.1
---
# [FIX-VM-SURI-YAML] Suricata 8.x include files require the legacy YAML envelope.
# [IPSIDS-PH1] Suricata 8.x workstation overrides.
# Loaded via --include by /usr/local/sbin/ipsids-suricata-run.sh so the vendor
# /etc/suricata/suricata.yaml stays untouched. See docs/adr/0012 regression
# fences and docs/ADR 0002 (detection-only).

app-layer:
  protocols:
    tls:
      ja3-fingerprints: yes
      ja4-fingerprints: yes

# Suricata 8.x changed the top-level default from 'ignore' to 'drop'.
# Phase 1 is detection-only (ADR 0002); restore workstation-safe behavior.
exception-policy: ignore
