# /etc/dnscrypt-proxy/dnscrypt-proxy.toml
# OpenBox v0.1 — DoH/DoT/DoQ + DNSSEC + anonymized relays
# Pi-hole upstream apontara para 127.0.0.1#5053

listen_addresses = ['127.0.0.1:5053']
max_clients = 250
ipv4_servers = true
ipv6_servers = false                    # IPv6 desativado consistente com sysctl
dnscrypt_servers = true
doh_servers = true
odoh_servers = true
http3 = true                            # DoH3 / QUIC
require_dnssec = true
require_nolog = true
require_nofilter = true
disabled_server_names = []

force_tcp = false
timeout = 5000
keepalive = 30
cert_refresh_delay = 240

# Bloqueia IPs publicos sendo retornados em respostas (anti-rebinding)
block_ipv6 = true
block_unqualified = true
block_undelegated = true
reject_ttl = 600

# Cache local
cache = true
cache_size = 4096
cache_min_ttl = 2400
cache_max_ttl = 86400
cache_neg_min_ttl = 60
cache_neg_max_ttl = 600

# Bootstrap resolvers (so usados ate o primeiro DoH server responder)
bootstrap_resolvers = ['9.9.9.11:53', '1.1.1.1:53']
ignore_system_dns = true

netprobe_timeout = 60
netprobe_address = '9.9.9.9:53'

# Logging minimo (nao logar queries — privacidade)
log_files_max_size = 10
log_files_max_age = 7
log_files_max_backups = 1

# ===== Anonymized DNS (camada extra de privacidade vs operador upstream) =====
[anonymized_dns]
routes = [
  { server_name = '*', via = ['anon-cs-fr', 'anon-cs-nl', 'anon-cs-ch'] }
]
skip_incompatible = true

# ===== Sources (lista de servers atualizada de fontes confiaveis) =====
[sources]
  [sources.public-resolvers]
  urls = ['https://raw.githubusercontent.com/DNSCrypt/dnscrypt-resolvers/master/v3/public-resolvers.md']
  cache_file = '/var/cache/dnscrypt-proxy/public-resolvers.md'
  minisign_key = 'RWQf6LRCGA9i53mlYecO4IzT51TGPpvWucNSCh1CBM0QTaLn73Y7GFO3'
  refresh_delay = 73
  prefix = ''

  [sources.relays]
  urls = ['https://raw.githubusercontent.com/DNSCrypt/dnscrypt-resolvers/master/v3/relays.md']
  cache_file = '/var/cache/dnscrypt-proxy/relays.md'
  minisign_key = 'RWQf6LRCGA9i53mlYecO4IzT51TGPpvWucNSCh1CBM0QTaLn73Y7GFO3'
  refresh_delay = 73
  prefix = ''

# ===== Filtragem aplicacional (basica — Pi-hole faz o pesado) =====
[query_log]
file = ''                               # vazio = sem log de queries
ignored_qtypes = ['DNSKEY', 'NS']

[nx_log]
file = ''
