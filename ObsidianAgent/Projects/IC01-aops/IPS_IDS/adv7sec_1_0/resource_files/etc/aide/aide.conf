# [IPS-PH1] Arch-focused AIDE baseline. Tune noise before enabling hard response.

# [FIX-VM-AIDE-CONF] AIDE 0.19 expects database_in, not database.
database_in=file:/var/lib/aide/aide.db.gz
database_out=file:/var/lib/aide/aide.db.new.gz
gzip_dbout=yes
log_level=warning
report_level=changed_attributes
report_url=stdout

NORMAL=p+i+n+u+g+s+m+c+sha512
STATIC=p+i+n+u+g+s+m+c+sha512
# [FIX-VM-AIDE-CONF] AIDE deprecates S; growing+s is the replacement.
LOG=p+u+g+n+growing+s

/boot NORMAL
/etc NORMAL
/usr/bin STATIC
/usr/lib STATIC
/usr/lib/systemd STATIC
/usr/local/bin STATIC
/usr/local/sbin STATIC
/var/lib/pacman NORMAL
/var/log LOG

!/var/log/journal
!/var/cache
!/var/tmp
!/tmp
!/run
!/proc
!/sys
!/dev
