# [IPS-PH1] Local Falco tuning for Arch workstation phase 1.

json_output: true
json_include_output_property: true

file_output:
  enabled: true
  keep_alive: false
  filename: /var/log/falco-events.json

stdout_output:
  enabled: false

syslog_output:
  enabled: false

rules_files:
  - /etc/falco/falco_rules.yaml
  - /etc/falco/falco_rules.local.yaml
  - /etc/falco/rules.d
