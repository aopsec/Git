version = 1

[project]
name = "ADV7ia"
tag = "adv7ia"

[vault]
root = "vault"
generated = "vault/Generated"

[render]
generator_ref = "plugins/aops-agent/obsidian-agent/obsidian_agent_cli.py"
regenerate_command = "python3 \"${AOPS_OBSIDIAN_AGENT_CLI:-$HOME/plugins/aops-agent/obsidian-agent/obsidian_agent_cli.py}\" --sync --repo ."
stale_message = "ADV7ia vault output is stale. Regenerate with:"
summary_fallback = "absolute"

[repository_map]
include = true
core_documents = [
  "README",
  "CONTROL_MESH_RUNBOOK",
  "LOCAL_AI_STACK_RUNBOOK",
  "LOCAL_AI_STACK_ARCH_LMSTUDIO_GUIDE",
  "AIDER_TEST_SOURCE_README",
]
manual_dashboards = [
  "ADV7ia Vault Home",
  "ADV7ia Operations Dashboard",
  "ADV7ia Control Mesh",
]

[related_notes]
defaults = ["README"]

[related_notes.match]
rag = ["RAG_QDRANT_OK", "RAG_MCP_OK", "LOCAL_AI_STACK_RUNBOOK"]
mcp = ["MCP_FILESYSTEM_OK", "GIT_MCP_OK", "RAG_MCP_OK"]
qdrant = ["RAG_QDRANT_OK", "LOCAL_AI_STACK_RUNBOOK", "LOCAL_AI_STACK_ARCH_LMSTUDIO_GUIDE"]
audit = ["LOCAL_AI_STACK_RUNBOOK", "LOCAL_AI_STACK_ARCH_LMSTUDIO_GUIDE"]
guide = ["README", "LOCAL_AI_STACK_ARCH_LMSTUDIO_GUIDE"]

[[catalog]]
label = "Project Docs"
folder = "Project Docs"
note_prefix = "Doc"
tag = "project-doc"
source_patterns = ["docs/*.md"]
title_mode = "standard"
index_name = "Project Doc Index"

[[catalog]]
label = "Tools"
folder = "Tools"
note_prefix = "Tool"
tag = "tool"
source_patterns = ["tools/*"]
title_mode = "standard"
index_name = "Tool Index"

[[catalog]]
label = "Validation"
folder = "Validation"
note_prefix = "Validation"
tag = "validation"
source_patterns = ["tests/*.sh"]
title_mode = "standard"
index_name = "Validation Index"

[[catalog]]
label = "Evidence"
folder = "Evidence"
note_prefix = "Evidence"
tag = "evidence"
source_patterns = ["evidence/*.log"]
title_mode = "standard"
index_name = "Evidence Index"
