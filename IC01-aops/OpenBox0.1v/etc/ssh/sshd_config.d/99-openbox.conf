# /etc/ssh/sshd_config.d/99-openbox.conf
# OpenBox v0.1 — SSH hardening (CIS-aligned)

Port 22
Protocol 2
AddressFamily inet                          # IPv4 only

# ===== Auth =====
PermitRootLogin no
PasswordAuthentication no
KbdInteractiveAuthentication no
ChallengeResponseAuthentication no
PubkeyAuthentication yes
AuthenticationMethods publickey
PermitEmptyPasswords no
MaxAuthTries 3
MaxSessions 4
LoginGraceTime 30
# [FIX-AUDIT-SSH] Keep the shipped profile bootstrap-safe. Add AllowUsers only
# after the operator account exists on the target host.

# ===== Hardening =====
X11Forwarding no
AllowTcpForwarding no
AllowAgentForwarding no
PermitTunnel no
PermitUserEnvironment no
ClientAliveInterval 300
ClientAliveCountMax 2
TCPKeepAlive no
Compression no
UseDNS no
# [FIX-AUDIT-SSH] Omit deprecated PrintLastLog for compatibility with current
# OpenSSH releases.
PrintMotd no
StrictModes yes

# ===== Crypto strong (modern only) =====
KexAlgorithms curve25519-sha256@libssh.org,curve25519-sha256,sntrup761x25519-sha512@openssh.com
Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com
MACs hmac-sha2-256-etm@openssh.com,hmac-sha2-512-etm@openssh.com
HostKeyAlgorithms ssh-ed25519,rsa-sha2-512,rsa-sha2-256

# ===== Banner =====
Banner /etc/issue.net
