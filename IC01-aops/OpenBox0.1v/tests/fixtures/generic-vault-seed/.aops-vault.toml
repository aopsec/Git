version = 1

[project]
name = "FixtureVault"
tag = "fixture-vault"

[vault]
root = "vault"
generated = "vault/Generated"

[render]
generator_ref = "plugins/aops-agent/obsidian-agent/obsidian_agent_cli.py"
regenerate_command = "python3 \"${AOPS_OBSIDIAN_AGENT_CLI:-$HOME/plugins/aops-agent/obsidian-agent/obsidian_agent_cli.py}\" --sync --repo ."
stale_message = "Vault output is stale. Regenerate with:"
summary_fallback = "relative"

[repository_map]
include = true
core_documents = ["README", "OPERATIONS"]
manual_dashboards = ["Vault Home"]

[related_notes]
defaults = ["README"]

[related_notes.match]
agent = ["OPERATIONS"]

[[catalog]]
label = "Automation"
folder = "Automation"
note_prefix = "Automation"
tag = "automation"
source_patterns = ["src/*.sh"]
title_mode = "standard"
index_name = "Automation Index"
